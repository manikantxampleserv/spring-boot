spring.application.name=starter

# PostgreSQL Configuration (Commented out because port 51214 is unreachable)
# spring.datasource.url=jdbc:postgresql://localhost:51214/template1?sslmode=disable
# spring.datasource.username=postgres
# spring.datasource.password=postgres
